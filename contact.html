<body>
<div id="nav-root"></div>

<section class="section-tight section-dim">
  <div class="container">
    <span class="eyebrow" data-ck="contact_hero_eyebrow">Contact</span>
    <h1 data-ck="contact_hero_title">Get in touch</h1>
  </div>
</section>

<section class="section">
  <div class="container grid grid-2">
    <div>
      <h3>Call or WhatsApp</h3>
      <p><a href="tel:+919599459187" data-tel-link="0" data-tel-link-text>+91 95994 59187</a><br><a href="tel:+917011509629" data-tel-link="1" data-tel-link-text>+91 70115 09629</a></p>
